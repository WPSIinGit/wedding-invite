<html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
}

/* 🎥 Background video */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(6px) brightness(0.5);
  z-index: -2;
}

/* 💛 Gold initials */
.logo {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  font-size: 40px;
  font-weight: bold;
  color: gold;
  text-shadow: 0 0 20px gold;
}

/* 💌 3D Envelope */
.envelope {
  width: 320px;
  height: 220px;
  background: linear-gradient(145deg, #d4af37, #b8860b);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;
  border-radius: 10px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.7);
  transition: 1s;
}

.envelope:before {
  content: "";
  position: absolute;
  border-left: 160px solid transparent;
  border-right: 160px solid transparent;
  border-top: 110px solid #f5d76e;
}

/* 💌 Envelope open animation */
.envelope.open {
  transform: translate(-50%, -150%) rotateX(180deg);
  opacity: 0;
}

/* 💛 Card */
.card {
  position: absolute;
  width: 90%;
  max-width: 520px;
  background: white;
  top: 50%;
  left: 50%;
  transform: translate(-50%, 60%);
  padding: 25px;
  border-radius: 14px;
  text-align: center;
  opacity: 0;
  transition: 1.2s;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}

.card.show {
  transform: translate(-50%, -50%);
  opacity: 1;
}

h1 {
  color: #b8860b;
}

/* buttons */
.btn {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.rsvp { background:#25D366; color:white; }
.save { background:gold; }

/* 🌹 petals */
.petal {
  position: absolute;
  top: -10px;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

/* ✨ sparkles */
.sparkle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: gold;
  border-radius: 50%;
  animation: sparkle 2s linear infinite;
}

@keyframes sparkle {
  0% {opacity:0; transform:scale(0);}
  50% {opacity:1;}
  100% {opacity:0; transform:scale(2);}
}

/* 🎵 music button */
.musicBtn {
  position: absolute;
  bottom: 20px;
  right: 20px;
  padding: 10px;
  background: gold;
  border: none;
  border-radius: 50%;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🎥 Background Video -->
<video autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2019/07/21/25428-349658768_large.mp4" type="video/mp4">
</video>

<!-- 💛 Logo -->
<div class="logo">D ❤️ H</div>

<!-- 💌 Envelope -->
<div class="envelope" onclick="openInvite()"></div>

<!-- 💛 Card -->
<div class="card" id="card">
  <h1>You + Me = Forever 💛</h1>

  <p><b>[Groom Name] & [Bride Name]</b></p>

  <p>
  As we begin our journey of love, trust, and togetherness,  
  we would be honored to have you bless our special day with your presence.
  </p>

  <p>
  📅 Date: [Your Date] <br>
  🕒 Time: [Your Time] <br>
  📍 Venue: [Your Venue]
  </p>

  <button class="btn rsvp" onclick="rsvp()">WhatsApp RSVP</button>
  <button class="btn save" onclick="saveDate()">Save Date</button>
</div>

<!-- 🎵 Music -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b7b8d2b1.mp3">
</audio>

<!-- 🎵 Music Button -->
<button class="musicBtn" onclick="toggleMusic()">🎵</button>

<script>

let musicStarted = false;

/* 💌 open invite */
function openInvite(){
  document.querySelector(".envelope").classList.add("open");
  document.getElementById("card").classList.add("show");

  if(!musicStarted){
    document.getElementById("music").play();
    musicStarted = true;
  }

  startEffects();
}

/* 🎵 music control */
function toggleMusic(){
  let m = document.getElementById("music");
  if(m.paused) m.play();
  else m.pause();
}

/* 💬 WhatsApp */
function rsvp(){
  window.open("https://wa.me/947XXXXXXXX","_blank");
}

/* 📅 Save Date */
function saveDate(){
  window.open("https://calendar.google.com","_blank");
}

/* 🌹 petals */
function createPetal(){
  const p = document.createElement("div");
  p.classList.add("petal");
  p.innerHTML = "🌹";
  p.style.left = Math.random()*window.innerWidth+"px";
  p.style.animationDuration = (3+Math.random()*5)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),8000);
}

/* ✨ sparkles */
function createSparkle(){
  const s = document.createElement("div");
  s.classList.add("sparkle");
  s.style.left = Math.random()*window.innerWidth+"px";
  s.style.top = Math.random()*window.innerHeight+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),2000);
}

function startEffects(){
  setInterval(createPetal,200);
  setInterval(createSparkle,300);
}

</script>

</body>
</html>
